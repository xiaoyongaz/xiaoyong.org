baseURL: "https://xiaoyong.org/"
languageCode: en-us
title: "Xiaoyong's Notes"
theme: PaperMod
paginate: 10

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

outputs:
  home:
    - HTML
    - RSS
    - JSON  # Required for search

params:
  env: production
  description: "Notes, blogs, and things I've learned — by Xiaoyong"
  author: Xiaoyong
  defaultTheme: auto  # auto switches based on OS preference
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: false
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: false

  # Home page info mode
  homeInfoParams:
    Title: "Hey there"
    Content: >
      Welcome to my corner of the internet.
      I write about things I learn, share notes, and occasionally blog.

  # Social icons on home page
  socialIcons:
    - name: github
      url: "https://github.com/xiaoyong"
    - name: rss
      url: "index.xml"

  # Search configuration
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys:
      - title
      - permalink
      - summary
      - content

  # Comments via giscus (configure after creating GitHub repo)
  # Uncomment and fill in after enabling GitHub Discussions
  # giscus:
  #   repo: "xiaoyong/xiaoyong.org"
  #   repoId: ""
  #   category: "Comments"
  #   categoryId: ""
  #   mapping: "pathname"
  #   reactionsEnabled: "1"
  #   emitMetadata: "0"
  #   inputPosition: "top"
  #   theme: "preferred_color_scheme"
  #   lang: "en"

  # Edit post link (points to GitHub)
  editPost:
    URL: "https://github.com/xiaoyong/xiaoyong.org/tree/main/content"
    Text: "Suggest Changes"
    appendFilePath: true

markup:
  highlight:
    anchorLineNos: false
    codeFences: true
    guessSyntax: true
    lineNos: false
    noClasses: false
    style: dracula
  goldmark:
    renderer:
      unsafe: true  # Allow raw HTML in markdown

menu:
  main:
    - identifier: home
      name: Home
      url: /
      weight: 1
    - identifier: posts
      name: Blog
      url: /posts/
      weight: 2
    - identifier: notes
      name: Notes
      url: /notes/
      weight: 3
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 4
    - identifier: search
      name: Search
      url: /search/
      weight: 5
    - identifier: about
      name: About
      url: /about/
      weight: 6

taxonomies:
  tag: tags
  category: categories
